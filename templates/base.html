<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Stripe Shop{% endblock %}</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f6f9fc;
            color: #32325d;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .card {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 4px 24px rgba(50,50,93,.1), 0 1px 3px rgba(0,0,0,.08);
            padding: 2.5rem;
            max-width: 480px;
            width: 100%;
        }

        h1 { font-size: 1.6rem; font-weight: 700; margin-bottom: .5rem; }
        p { color: #6b7c93; line-height: 1.6; margin-bottom: .75rem; }

        .price {
            font-size: 2rem;
            font-weight: 800;
            color: #32325d;
            margin: 1rem 0;
        }

        .currency-badge {
            display: inline-block;
            background: #e8f4fd;
            color: #1a73e8;
            font-size: .75rem;
            font-weight: 600;
            padding: .2rem .6rem;
            border-radius: 20px;
            margin-left: .4rem;
            vertical-align: middle;
        }

        .btn {
            display: inline-block;
            width: 100%;
            padding: .85rem 1.5rem;
            background: #635bff;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background .2s, transform .1s;
            text-align: center;
        }

        .btn:hover { background: #4f46e5; }
        .btn:active { transform: scale(.98); }
        .btn:disabled { background: #a0aec0; cursor: not-allowed; }

        .error {
            color: #e53e3e;
            font-size: .9rem;
            margin-top: .75rem;
            min-height: 1.2rem;
        }

        .divider { border: none; border-top: 1px solid #e8ecf0; margin: 1.5rem 0; }

        .items-list { list-style: none; }
        .items-list li {
            display: flex;
            justify-content: space-between;
            padding: .5rem 0;
            border-bottom: 1px solid #f0f4f8;
        }
        .items-list li:last-child { border-bottom: none; }

        .total {
            display: flex;
            justify-content: space-between;
            font-weight: 700;
            font-size: 1.1rem;
            margin-top: 1rem;
        }

        .badge {
            display: inline-block;
            background: #f0fdf4;
            color: #15803d;
            font-size: .75rem;
            padding: .2rem .6rem;
            border-radius: 20px;
            margin-left: .4rem;
        }

        .success-icon { font-size: 4rem; text-align: center; margin-bottom: 1rem; }
        .success-icon svg { width: 64px; height: 64px; }
    </style>
</head>
<body>
    {% block content %}{% endblock %}
</body>
</html>
