{% extends "base.html" %}

{% block title %}{{ item.name }}{% endblock %}

{% block content %}
<div class="card">
    <h1>{{ item.name }}</h1>
    {% if item.description %}
        <p>{{ item.description }}</p>
    {% endif %}
    <div class="price">
        {{ item.price }}
        <span class="currency-badge">{{ item.get_currency_display }}</span>
    </div>
    <hr class="divider">
    <button id="buy-button" class="btn">Оплатить</button>
    <p class="error" id="error-message"></p>
</div>

<script src="https://js.stripe.com/v3/"></script>
<script>
    var stripe = Stripe('{{ stripe_public_key }}');
    var btn = document.getElementById('buy-button');
    var errorEl = document.getElementById('error-message');

    btn.addEventListener('click', function () {
        btn.disabled = true;
        btn.textContent = 'Подождите...';
        fetch('/buy/{{ item.pk }}/', { method: 'GET' })
            .then(function (res) { return res.json(); })
            .then(function (data) {
                return stripe.redirectToCheckout({ sessionId: data.id });
            })
            .then(function (result) {
                if (result.error) {
                    errorEl.textContent = result.error.message;
                    btn.disabled = false;
                    btn.textContent = 'Оплатить';
                }
            })
            .catch(function () {
                errorEl.textContent = 'Что-то пошло не так. Попробуйте позже.';
                btn.disabled = false;
                btn.textContent = 'Оплатить';
            });
    });
</script>
{% endblock %}
